<!-- RSVP SECTION -->
<section id="rsvp" class="py-32 px-6 flex flex-col items-center justify-center bg-white relative">
    <div id="kp-rsvp-card" class="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl border border-white text-center" data-aos="zoom-in">
        
        <div id="kp-form-area">
            <h2 class="text-4xl mb-4 fun-font text-blue-950">RSVP</h2>
            <p class="text-center text-xs mb-10 opacity-60">Can't join the dance? Leave your blessing below!</p>
            
            <form action="https://formspree.io/f/xnjlaoqw" method="POST" id="kpForm" class="space-y-5 text-left">
                <input type="text" name="Name" placeholder="Your Full Name" class="w-full p-5 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-spice outline-none" required>
                <select name="Attendance" class="w-full p-5 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-spice outline-none appearance-none font-bold text-blue-900" required>
                    <option value="" disabled selected>Attending?</option>
                    <option value="Yes">Yes! ✅</option>
                    <option value="No">No 😢</option>
                </select>
                <textarea name="Message" placeholder="Message for Tatenda..." class="w-full p-5 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-spice outline-none h-32"></textarea>
                <button type="submit" id="kpSubmit" class="w-full py-6 btn-party rounded-2xl font-bold uppercase tracking-[0.3em] text-xs">Send Response</button>
            </form>
        </div>

        <!-- SUCCESS SCREEN -->
        <div id="kp-success" class="hidden animate-fade-in">
            <div class="text-5xl mb-6">🍳</div>
            <h2 class="text-3xl mb-4 fun-font text-spice">You're on the list!</h2>
            <p class="mb-8 italic opacity-70">Get your denim ready for the 22nd.</p>
            
            <div class="bg-orange-50 p-6 rounded-3xl border border-orange-100 text-left">
                <p class="text-[10px] uppercase font-bold text-blue-900 tracking-widest mb-4">Set a Reminder</p>
                <div class="grid grid-cols-1 gap-2">
                    <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Tatenda%27s+Kitchen+Party&dates=20261222T120000Z/20261222T180000Z&details=The+real+lessons+begin!&location=7110+Flamingo,+Greenside,+Mutare" target="_blank" class="py-3 bg-white text-blue-900 rounded-xl text-[10px] font-bold text-center shadow-sm">GOOGLE CALENDAR</a>
                    <a href="https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent&subject=Tatenda%27s+Kitchen+Party&startdt=2026-12-22T12:00:00&enddt=2026-12-22T18:00:00&body=Kitchen+Party!&location=7110+Flamingo,+Greenside,+Mutare" target="_blank" class="py-3 bg-blue-900 text-white rounded-xl text-[10px] font-bold text-center">OUTLOOK / APPLE</a>
                </div>

                <div class="mt-6 pt-6 border-t border-orange-200">
                    <p class="text-[9px] font-bold opacity-60 mb-2 uppercase italic">Optional: Get an invite via email</p>
                    <form action="https://formspree.io/f/xnjlaoqw" method="POST" class="flex gap-1">
                        <input type="email" name="Invite_Email" placeholder="Your Email" class="flex-1 p-3 rounded-lg text-xs outline-none border-none ring-1 ring-blue-100">
                        <button type="submit" class="px-4 bg-blue-950 text-white rounded-lg text-[9px] font-bold">SEND</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    const kpForm = document.getElementById('kpForm');
    kpForm.onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('kpSubmit').innerText = "SENDING...";
        const response = await fetch(kpForm.action, {
            method: 'POST',
            body: new FormData(kpForm),
            headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
            document.getElementById('kp-form-area').classList.add('hidden');
            document.getElementById('kp-success').classList.remove('hidden');
        }
    };
</script>
